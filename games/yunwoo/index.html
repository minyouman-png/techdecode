<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>윤우를 위한 한글 달리기 🏃</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#8fd3ff;
    font-family:'Apple SD Gothic Neo','Malgun Gothic','Hiragino Sans',sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; }
  canvas#game { display:block; position:fixed; inset:0; z-index:1; touch-action:none; }

  /* 메뉴/오버레이 공통 */
  .screen { position:fixed; inset:0; z-index:10; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center;
    background:linear-gradient(180deg,#7ec8ff 0%,#bfe9ff 55%,#c8f0a8 100%); padding:20px; }
  .screen.on { display:flex; }
  h1.title { font-size:min(13vw,64px); font-weight:900; color:#fff; line-height:1.1;
    text-shadow:0 3px 0 #ff8a3d, 0 6px 0 #e5661b, 0 9px 14px rgba(0,0,0,.25); letter-spacing:1px; }
  h1.title small { display:block; font-size:min(4.5vw,20px); color:#fff6d8; margin-top:10px;
    text-shadow:0 2px 0 #4a8f2f; letter-spacing:3px; }
  .sub { font-size:min(4.6vw,19px); color:#2c4b6e; font-weight:800; background:rgba(255,255,255,.66);
    padding:10px 18px; border-radius:16px; max-width:560px; line-height:1.7; }
  .sub b { color:#e5661b; }
  .bigbtn { font-family:inherit; font-size:min(6.5vw,26px); font-weight:900; cursor:pointer;
    color:#fff; padding:16px 44px; border:none; border-radius:22px;
    background:linear-gradient(180deg,#ffcf3f,#ff9a1f); box-shadow:0 6px 0 #d97706, 0 10px 18px rgba(0,0,0,.25);
    transition:transform .06s; }
  .bigbtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d97706; }
  .midbtn { font-family:inherit; font-size:min(5vw,18px); font-weight:800; cursor:pointer; color:#fff;
    padding:12px 26px; border:none; border-radius:16px; background:linear-gradient(180deg,#6ec1ff,#3d8bde);
    box-shadow:0 5px 0 #2e6cb0; }
  .midbtn:active { transform:translateY(3px); box-shadow:0 2px 0 #2e6cb0; }
  .row { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .hero { width:min(34vw,150px); image-rendering:auto; filter:drop-shadow(0 8px 10px rgba(0,0,0,.25)); }

  /* 기록/결과 패널 */
  .panel { background:rgba(255,255,255,.9); border-radius:20px; padding:18px 22px; max-width:92vw;
    max-height:56vh; overflow:auto; box-shadow:0 8px 24px rgba(0,0,0,.2); }
  .panel table { border-collapse:collapse; width:100%; font-size:min(4.2vw,16px); color:#2c4b6e; }
  .panel th { color:#e5661b; padding:6px 10px; font-size:min(3.6vw,13px); text-align:left; }
  .panel td { padding:7px 10px; border-top:2px solid #eef3f8; font-weight:700; }
  .panel tr.best td { background:#fff6d8; }
  .empty { color:#6b7f95; font-weight:700; padding:14px; }
  .bignum { font-size:min(16vw,80px); font-weight:900; color:#e5661b; line-height:1;
    text-shadow:0 3px 0 #fff, 0 6px 10px rgba(0,0,0,.2); }
  .cheer { font-size:min(7vw,30px); font-weight:900; color:#2c4b6e; }

  /* 상단 소리 버튼 (게임중) */
  #sndBtn { position:fixed; right:12px; top:12px; z-index:6; width:46px; height:46px; display:none;
    border:none; border-radius:14px; font-size:22px; cursor:pointer; color:#fff;
    background:rgba(0,0,0,.32); }
  body.playing #sndBtn { display:block; }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="sndBtn">🔊</button>

  <!-- 메인 메뉴 -->
  <div class="screen on" id="menu">
    <img class="hero" src="img/yunwoo.png" alt="윤우">
    <h1 class="title">윤우를 위한<br>한글 달리기<small>ㄱ · ㄴ · ㄷ · ㄹ · ㅁ 글자 잡기 놀이</small></h1>
    <div class="sub">달리다가 <b>「글자」</b>가 나오면 잘 보자!<br>
      제시된 자음으로 <b>시작하는 글자</b>면 <b>점프(스페이스/화면 터치)</b>해서 먹고,<br>
      아니면 그냥 지나가자. <b>100문제</b>를 다 맞추면 기록이 남아요!</div>
    <div class="row">
      <button class="bigbtn" id="startBtn">▶ 시작하기</button>
    </div>
    <div class="row">
      <button class="midbtn" id="recBtn">🏆 기록 보기</button>
    </div>
    <div id="bestLine" class="sub" style="display:none"></div>
  </div>

  <!-- 기록 -->
  <div class="screen" id="records">
    <h1 class="title" style="font-size:min(9vw,44px)">🏆 윤우의 기록</h1>
    <div class="panel" id="recPanel"></div>
    <button class="midbtn" id="recBackBtn">← 돌아가기</button>
  </div>

  <!-- 완주 결과 -->
  <div class="screen" id="done">
    <div class="cheer">🎉 100문제 완주! 🎉</div>
    <div class="bignum" id="doneScore">0</div>
    <div class="sub" id="doneMsg"></div>
    <div class="panel" id="donePanel"></div>
    <div class="row">
      <button class="bigbtn" id="againBtn">다시 하기</button>
      <button class="midbtn" id="doneMenuBtn">메뉴로</button>
    </div>
  </div>

<script>
(function(){
"use strict";
/* =========================================================================
   윤우를 위한 한글 달리기 — 무한 자동 러너 + 한글 초성 학습
   조작: 스페이스 / 화면 터치 = 점프.  100문제 완주 시 날짜·점수 기록.
   ========================================================================= */

/* ---------- 한글 초성 ---------- */
var CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function choseongOf(s){
  var c = s.charCodeAt(0);
  if(c>=0xAC00 && c<=0xD7A3){ return CHO[Math.floor((c-0xAC00)/588)]; }
  return null;
}
/* 문제로 낼 기본 자음 (된소리 제외 → 6살 눈높이) */
var TARGETS = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

/* 자음별 단어 은행 (전부 기본 초성) */
var WORDS = {
  'ㄱ':['과자','고래','기차','고양이','곰','가방','구름','김밥','개구리','귤','감','가위'],
  'ㄴ':['나무','나비','낙타','눈사람','노래','냉장고','나팔','늑대','넥타이','농구','낚시','눈'],
  'ㄷ':['도넛','다람쥐','돼지','달','도토리','두더지','당근','도시락','독수리','돌고래','단추','다리'],
  'ㄹ':['라면','로봇','레몬','리본','라디오','로켓','라일락','링','라마','루비','레고','라면'],
  'ㅁ':['무지개','문어','물고기','모자','머리','말','미역','목도리','마늘','매미','만두','모래'],
  'ㅂ':['바나나','배','방울','버섯','비행기','북','부엉이','별','벌','바다','바지','벌레'],
  'ㅅ':['사과','사자','수박','시계','새','손','소','신발','사탕','산','숟가락','수건'],
  'ㅇ':['아기','오리','우산','이불','여우','우유','안경','원숭이','오이','얼음','연필','양말'],
  'ㅈ':['자동차','자전거','장미','지렁이','종이','주사위','젤리','조개','지도','자석','잠자리','전화'],
  'ㅊ':['참외','치마','초콜릿','책','청개구리','침대','축구','참새','천둥','촛불','치약','청소'],
  'ㅋ':['코끼리','컵','케이크','카메라','코알라','콩','크레파스','카드','키위','콩나물','코','커피'],
  'ㅌ':['토끼','토마토','태양','튤립','탬버린','통','텐트','트럭','태극기','탱크','타조','티셔츠'],
  'ㅍ':['피아노','포도','팽이','풍선','파도','편지','팔','피자','파리','포크','펭귄','파','풀'],
  'ㅎ':['하마','호랑이','해','해바라기','하트','학','허수아비','헬리콥터','하늘','휴지','호박','화분']
};

/* ---------- 저장소 ---------- */
var STORE = 'yunwoo_hangul_v1';
function loadRecs(){ try{ return JSON.parse(localStorage.getItem(STORE))||[]; }catch(e){ return []; } }
function saveRec(r){
  var a = loadRecs(); a.push(r);
  a.sort(function(x,y){ return y.score - x.score; });
  a = a.slice(0,20);
  try{ localStorage.setItem(STORE, JSON.stringify(a)); }catch(e){}
  return a;
}
function bestScore(){ var a=loadRecs(); return a.length? a[0].score : 0; }

/* ---------- 사운드 (WebAudio) ---------- */
var AC=null, muted=false;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq, dur, type, vol){
  if(muted) return; var c=ac(); if(!c) return;
  try{
    var o=c.createOscillator(), g=c.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.value=0.0001; o.connect(g); g.connect(c.destination);
    var t=c.currentTime;
    g.gain.exponentialRampToValueAtTime(vol||0.16, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
// 예약 재생용(스케줄러/멜로디)
function tone(freq,dur,when,type,vol,dest){
  if(muted) return; var c=ac(); if(!c) return;
  try{
    var o=c.createOscillator(), g=c.createGain();
    o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(dest||c.destination);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(vol||0.12, when+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, when+dur);
    o.start(when); o.stop(when+dur+0.03);
  }catch(e){}
}
function mKick(when,dest){
  if(muted) return; var c=ac(); if(!c) return;
  try{
    var o=c.createOscillator(), g=c.createGain();
    o.type='sine'; o.frequency.setValueAtTime(150,when); o.frequency.exponentialRampToValueAtTime(50,when+0.12);
    g.gain.setValueAtTime(0.0001,when); g.gain.exponentialRampToValueAtTime(0.9,when+0.01); g.gain.exponentialRampToValueAtTime(0.0001,when+0.18);
    o.connect(g); g.connect(dest||c.destination); o.start(when); o.stop(when+0.2);
  }catch(e){}
}
// ---- 효과음 ----
function sndJump(){ beep(520,0.07,'square',0.13); setTimeout(function(){ beep(780,0.09,'square',0.12); },55); }   // 통통 boing↑
function sndGood(){ [523.25,659.25,783.99].forEach(function(f,i){ setTimeout(function(){ beep(f,0.12,'triangle',0.19); }, i*70); }); } // 딩동댕↑
function sndBad(){ beep(320,0.12,'triangle',0.13); setTimeout(function(){ beep(200,0.17,'triangle',0.13); },95); } // 부드러운 삐↓(안 무섭게)
function sndCheer(){ [659.25,783.99,987.77,1318.51].forEach(function(f,i){ setTimeout(function(){beep(f,0.16,'triangle',0.2);}, i*90); }); } // 반짝
function sndFinish(){ [523.25,659.25,783.99,1046.5,1318.5].forEach(function(f,i){ setTimeout(function(){beep(f,0.24,'triangle',0.22);}, i*150); });
  setTimeout(function(){ beep(1046.5,0.55,'triangle',0.2); beep(1318.5,0.55,'triangle',0.15); },820); } // 팡파레

// ---- 배경음악 (밝은 C장조 펜타토닉 루프, 자체 생성) ----
var Music=(function(){
  var master=null, timer=null, nextT=0, step=0, on=false;
  var TEMPO=132, ST=(60/TEMPO)/4, LOOP=32;   // 16분음표 길이(초), 2마디 루프
  var MEL=[[0,392,2],[2,440,2],[4,523.25,2],[6,440,2],[8,392,2],[10,329.63,2],[12,392,4],
           [16,440,2],[18,523.25,2],[20,587.33,2],[22,523.25,2],[24,440,2],[26,392,2],[28,329.63,4]];
  var BASS=[130.81,130.81,196.0,196.0,174.61,174.61,196.0,196.0]; // C C G G F F G G (박자별)
  function schedStep(s,when){
    for(var i=0;i<MEL.length;i++){ if(MEL[i][0]===s){ tone(MEL[i][1], MEL[i][2]*ST*0.9, when, 'triangle', 0.16, master); } }
    if(s%4===0){ var beat=(s/4)%8; tone(BASS[beat], ST*3.6, when, 'sine', 0.20, master); mKick(when,master); }
    if(s%4===2){ tone(1800,0.03,when,'square',0.04,master); } // 하이햇 틱
  }
  function sched(){ var c=ac(); if(!c) return; while(nextT < c.currentTime + 0.14){ schedStep(step,nextT); nextT+=ST; step=(step+1)%LOOP; } }
  return {
    start:function(){ if(on)return; var c=ac(); if(!c)return; if(c.state==='suspended')c.resume();
      master=c.createGain(); master.gain.value=muted?0:0.14; master.connect(c.destination);
      on=true; step=0; nextT=c.currentTime+0.1; timer=setInterval(sched,25); },
    stop:function(){ on=false; if(timer)clearInterval(timer); timer=null; if(master){ try{master.disconnect();}catch(e){} } master=null; },
    setMuted:function(m){ if(master) master.gain.value = m?0:0.14; }
  };
})();

/* ---------- 캔버스 ---------- */
var cv = document.getElementById('game');
var ctx = cv.getContext('2d');
var W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

/* ---------- 스프라이트 ---------- */
var heroImg = new Image(); heroImg.src='img/yunwoo.png'; var heroReady=false;
heroImg.onload=function(){ heroReady=true; };

/* ---------- 게임 상태 ---------- */
var G = {}; // 현재 게임
function newGame(){
  G = {
    running:false, over:false,
    t:0,                 // 경과 시간(초)
    scroll:0,            // 배경 스크롤
    speed:0,             // 현재 스크롤 속도(px/s)
    score:0,
    qNum:0,              // 맞춘 문제 수
    target:'',
    wrong:0,
    birds:[],
    sparks:[],
    spawnTimer:0,
    // 플레이어
    px:0, py:0, vy:0, grounded:true, tilt:0, runPhase:0,
    // 연출
    praise:null, praiseT:0,
    flash:null, flashT:0,   // 정답/오답 순간 큰 자음 플래시
    shake:0,
    startMs:0
  };
  nextQuestion(true);
}
var PRAISE = ['정윤우 멋있다!','윤우야 사랑해! ❤️','윤우 너 너무 똑똑해!','우와 윤우 최고! 🌟','역시 우리 윤우!','윤우는 한글 천재! 🧠','윤우 완전 대단해!'];
function nextQuestion(first){
  var prev = G.target;
  var t;
  do { t = TARGETS[(Math.random()*TARGETS.length)|0]; } while(t===prev && TARGETS.length>1);
  G.target = t;
  G.flash = t; G.flashT = 1.0;
}

/* 단어 하나 뽑기: match=true면 현재 target으로 시작하는 단어, 아니면 다른 자음 단어 */
function pickWord(match){
  if(match){
    var list = WORDS[G.target];
    return list[(Math.random()*list.length)|0];
  } else {
    var t;
    do { t = TARGETS[(Math.random()*TARGETS.length)|0]; } while(t===G.target);
    var l = WORDS[t];
    return l[(Math.random()*l.length)|0];
  }
}

/* ---------- 물리 상수(해상도 비례) ---------- */
function groundY(){ return H*0.80; }
function playerH(){ return Math.min(H*0.18, 150); }
function gravity(){ return H*2.7; }
function jumpV(){ return Math.sqrt(2*gravity()*H*0.30); } // 정점 ≈ 0.30H
function airLaneY(){ return groundY() - H*0.34; }         // 새가 나는 높이(정점에서 닿음)
function scrollSpeed(){ return W*0.17; } // 아이용: 예전(0.34)보다 2배 느리게

/* ---------- 입력 ---------- */
function doJump(){
  if(!G.running || G.over) return;
  if(G.grounded){ G.vy = -jumpV(); G.grounded=false; sndJump(); if(AC&&AC.state==='suspended')AC.resume(); }
}
window.addEventListener('keydown', function(e){
  if(e.code==='Space'||e.key===' '){ e.preventDefault(); doJump(); }
});
cv.addEventListener('pointerdown', function(e){ e.preventDefault(); doJump(); }, {passive:false});

/* ---------- 스폰 ---------- */
function spawnBird(){
  var word = pickWord(Math.random()<0.5);
  var kinds = ['bird','ptero'];
  G.birds.push({
    x: W + W*0.12,
    y: airLaneY() + (Math.random()*2-1)*H*0.025,
    word: word,
    kind: kinds[(Math.random()*kinds.length)|0],
    hue: [200,20,120,280,45,340][(Math.random()*6)|0],
    flap: Math.random()*6.28,
    eaten:false, pop:0
  });
}

/* ---------- 충돌 ---------- */
function bubbleBox(b){
  var fs = Math.min(H*0.045, 34);
  var w = Math.max(b.word.length*fs*0.62 + fs*0.9, fs*2.4);
  var h = fs*1.8;
  return { x:b.x - w/2, y:b.y - h/2, w:w, h:h };
}
function overlap(ax,ay,aw,ah, bx,by,bw,bh){
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

/* ---------- 정답/오답 ---------- */
function addSparks(x,y,color){
  for(var i=0;i<16;i++){
    var a=Math.random()*6.28, s=(Math.random()*0.5+0.4)*H*0.6;
    G.sparks.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-H*0.2,life:0.7,color:color});
  }
}
function onCorrect(b){
  b.eaten=true; b.pop=1;
  G.score += 100; G.qNum++;
  addSparks(b.x,b.y,'#ffd400'); sndGood();
  G.flash = G.target; G.flashT = 0.5;
  if(G.qNum % 5 === 0){
    G.praise = PRAISE[(Math.random()*PRAISE.length)|0]; G.praiseT = 1.8; sndCheer();
  }
  if(G.qNum >= 100){ finish(); return; }
  nextQuestion(false);
}
function onWrong(b){
  b.eaten=true; b.pop=1;
  G.score = Math.max(0, G.score - 50); G.wrong++;
  G.shake = 0.4; sndBad();
  G.praise = '앗! 아니야~ 다시!'; G.praiseT = 0.9;
}

/* ---------- 완주 ---------- */
function finish(){
  G.over=true; G.running=false; Music.stop();
  var sec = Math.round((Date.now()-G.startMs)/1000);
  var now = new Date();
  var date = now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0')
    +' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var rec = { date:date, score:G.score, wrong:G.wrong, sec:sec };
  var all = saveRec(rec);
  sndFinish();
  showDone(rec, all);
}

/* ---------- 업데이트 ---------- */
function update(dt){
  G.t += dt;
  if(G.flashT>0) G.flashT -= dt;
  if(G.praiseT>0) G.praiseT -= dt;
  if(G.shake>0) G.shake -= dt*2;

  // 속도 서서히 증가(살짝)
  G.speed = scrollSpeed() * (1 + Math.min(G.qNum,40)*0.006);
  G.scroll += G.speed*dt;

  // 플레이어 물리
  G.px = W*0.22;
  if(!G.grounded){
    G.vy += gravity()*dt;
    G.py += G.vy*dt;
    var floor = groundY() - playerH();
    if(G.py >= floor){ G.py=floor; G.vy=0; G.grounded=true; }
    G.tilt = Math.max(-0.25, Math.min(0.25, -G.vy/(jumpV()*2)));
  } else {
    G.py = groundY() - playerH();
    G.runPhase += dt*(5 + (G.speed/Math.max(1,W))*30); // 발 구르기 속도(속도비례)
    G.tilt = Math.sin(G.runPhase*2)*0.04;               // 달리기 리듬 흔들림
  }

  // 스폰
  G.spawnTimer -= dt;
  if(G.spawnTimer<=0){ spawnBird(); G.spawnTimer = 2.3 - Math.min(G.qNum,50)*0.012; } // 스폰도 2배 여유

  // 새 이동 & 충돌
  var pbx=G.px, pby=G.py, pbw=playerH()*0.62, pbh=playerH()*0.9;
  pbx += (playerH()-pbw)/2;
  for(var i=G.birds.length-1;i>=0;i--){
    var b=G.birds[i];
    b.flap += dt*10;
    if(b.pop>0){ b.pop -= dt*3; if(b.pop<=0){ G.birds.splice(i,1); continue; } continue; }
    b.x -= G.speed*dt;
    if(b.x < -W*0.2){ G.birds.splice(i,1); continue; }
    if(!b.eaten){
      var bb=bubbleBox(b);
      if(overlap(pbx,pby,pbw,pbh, bb.x,bb.y,bb.w,bb.h)){
        if(choseongOf(b.word)===G.target) onCorrect(b); else onWrong(b);
      }
    }
  }

  // 스파크
  for(var j=G.sparks.length-1;j>=0;j--){
    var s=G.sparks[j];
    s.life -= dt; if(s.life<=0){ G.sparks.splice(j,1); continue; }
    s.vy += gravity()*0.5*dt; s.x+=s.vx*dt; s.y+=s.vy*dt;
  }
}

/* ---------- 그리기 ---------- */
function drawBg(){
  // 하늘
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#6fc3ff'); g.addColorStop(0.6,'#bfe9ff'); g.addColorStop(1,'#e9f7d0');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 해 (웃는 얼굴)
  var sx=W*0.86, sy=H*0.16, sr=Math.min(W,H)*0.07;
  ctx.save();
  ctx.fillStyle='#ffdf5e';
  for(var r=0;r<12;r++){ ctx.save(); ctx.translate(sx,sy); ctx.rotate(r/12*6.28 + G.t*0.3);
    ctx.fillRect(sr*1.15,-3,sr*0.5,6); ctx.restore(); }
  ctx.beginPath(); ctx.arc(sx,sy,sr,0,6.28); ctx.fill();
  ctx.fillStyle='#e59b2b';
  ctx.beginPath(); ctx.arc(sx-sr*0.32,sy-sr*0.1,sr*0.11,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+sr*0.32,sy-sr*0.1,sr*0.11,0,6.28); ctx.fill();
  ctx.lineWidth=Math.max(2,sr*0.09); ctx.strokeStyle='#e59b2b'; ctx.beginPath();
  ctx.arc(sx,sy+sr*0.12,sr*0.45,0.2,Math.PI-0.2); ctx.stroke();
  ctx.restore();
  // 구름
  ctx.fillStyle='rgba(255,255,255,.92)';
  for(var c=0;c<4;c++){
    var cw=W*0.18, base=(c*W*0.33 - (G.scroll*0.15)% (W*1.4));
    var cx=((base%(W*1.4))+ (W*1.4))%(W*1.4) - W*0.2, cy=H*(0.12+0.06*c%2);
    cloud(cx,cy,cw);
  }
  // 먼 언덕
  ctx.fillStyle='#a6e08a';
  hills(H*0.62, W*0.5, 0.06, '#a6e08a');
  ctx.fillStyle='#8fd36f';
  hills(H*0.72, W*0.4, 0.10, '#8fd36f');
  // 땅
  var gy=groundY();
  ctx.fillStyle='#7bc451'; ctx.fillRect(0,gy,W,H-gy);
  ctx.fillStyle='#69b23f'; ctx.fillRect(0,gy,W,Math.max(6,H*0.015));
  // 잔디 + 꽃 (스크롤)
  var step=W*0.09, off=(G.scroll% step);
  for(var x=-off; x<W+step; x+=step){
    ctx.strokeStyle='#5ea336'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,gy+H*0.02); ctx.lineTo(x-6,gy-H*0.008); ctx.moveTo(x,gy+H*0.02); ctx.lineTo(x+6,gy-H*0.008); ctx.stroke();
    var fx=x+step*0.5, fy=gy+H*0.06, fr=Math.max(4,H*0.012);
    var hue=[0,50,300,200][((x*7)|0)%4];
    ctx.fillStyle='hsl('+hue+',85%,65%)';
    for(var p=0;p<5;p++){ ctx.beginPath(); ctx.arc(fx+Math.cos(p/5*6.28)*fr, fy+Math.sin(p/5*6.28)*fr, fr*0.7,0,6.28); ctx.fill(); }
    ctx.fillStyle='#ffe15e'; ctx.beginPath(); ctx.arc(fx,fy,fr*0.6,0,6.28); ctx.fill();
  }
}
function cloud(x,y,w){
  ctx.beginPath();
  ctx.arc(x,y,w*0.28,0,6.28); ctx.arc(x+w*0.28,y-w*0.06,w*0.34,0,6.28);
  ctx.arc(x+w*0.6,y,w*0.28,0,6.28); ctx.rect(x-w*0.05,y,w*0.7,w*0.28); ctx.fill();
}
function hills(baseY, amp, freq, col){
  ctx.beginPath(); ctx.moveTo(0,H);
  for(var x=0;x<=W;x+=12){
    var y=baseY - Math.abs(Math.sin((x+G.scroll*freq)*0.004))*amp;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

function drawBird(b){
  var x=b.x, y=b.y, s=Math.min(H*0.05,40);
  ctx.save(); ctx.translate(x, y - s*1.15); // 몸통은 말풍선 위에
  var flap=Math.sin(b.flap)*0.5;
  if(b.kind==='ptero'){
    // 익룡
    ctx.fillStyle='hsl('+b.hue+',60%,55%)';
    ctx.beginPath(); // 몸
    ctx.ellipse(0,0,s*0.9,s*0.5,0,0,6.28); ctx.fill();
    ctx.beginPath(); // 날개
    ctx.moveTo(-s*0.2,0); ctx.lineTo(-s*1.8, -s*0.9 - flap*s); ctx.lineTo(-s*0.3,-s*0.2); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s*0.2,0); ctx.lineTo(s*1.8, -s*0.9 - flap*s); ctx.lineTo(s*0.3,-s*0.2); ctx.closePath(); ctx.fill();
    // 머리 볏
    ctx.fillStyle='hsl('+b.hue+',70%,45%)';
    ctx.beginPath(); ctx.moveTo(s*0.7,-s*0.2); ctx.lineTo(s*1.5,-s*0.7); ctx.lineTo(s*1.0,0.0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffcf3f'; // 부리
    ctx.beginPath(); ctx.moveTo(s*0.8,0); ctx.lineTo(s*1.6,s*0.05); ctx.lineTo(s*0.8,s*0.25); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(s*0.55,-s*0.1,s*0.1,0,6.28); ctx.fill();
  } else {
    // 새
    ctx.fillStyle='hsl('+b.hue+',75%,60%)';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.8,s*0.6,0,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-s*0.7,-s*0.3,s*0.5,s*0.3, -0.6+flap,0,6.28); ctx.fill(); // 날개
    ctx.fillStyle='hsl('+b.hue+',75%,72%)';
    ctx.beginPath(); ctx.arc(s*0.6,-s*0.2,s*0.42,0,6.28); ctx.fill(); // 머리
    ctx.fillStyle='#ff9a1f'; ctx.beginPath(); // 부리
    ctx.moveTo(s*0.95,-s*0.2); ctx.lineTo(s*1.4,-s*0.1); ctx.lineTo(s*0.95,-s*0.02); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(s*0.7,-s*0.3,s*0.09,0,6.28); ctx.fill();
    ctx.fillStyle='hsl('+b.hue+',75%,45%)'; // 꼬리
    ctx.beginPath(); ctx.moveTo(-s*0.7,0); ctx.lineTo(-s*1.3,-s*0.2); ctx.lineTo(-s*1.3,s*0.3); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // 말풍선 + 글자
  var bb=bubbleBox(b), fs=Math.min(H*0.045,34);
  var scale = b.pop>0 ? 1+ (1-b.pop)*0.6 : 1;
  ctx.save(); ctx.translate(b.x, b.y); ctx.scale(scale,scale); ctx.globalAlpha = b.pop>0? b.pop:1; // 말풍선 = 충돌 중심(b.y)
  roundRect(-bb.w/2, -bb.h/2, bb.w, bb.h, bb.h*0.4);
  ctx.fillStyle='#ffffff'; ctx.fill();
  ctx.lineWidth=Math.max(2,fs*0.12); ctx.strokeStyle='#ff9a1f'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-bb.h*0.18,-bb.h/2); ctx.lineTo(0,-bb.h*0.9); ctx.lineTo(bb.h*0.18,-bb.h/2); ctx.closePath();
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.fillStyle='#2c4b6e'; ctx.font='900 '+fs+'px "Apple SD Gothic Neo","Malgun Gothic",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(b.word, 0, 0);
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

var FOOT_FRAC=0.15; // 스프라이트 하단(발) 잘라내고 다리로 대체하는 비율
function drawLegs(dw, dh, hemY){
  var jump = !G.grounded;
  var hipHalf = dw*0.14;
  var legLen  = dh*FOOT_FRAC;      // 쉴 때 발끝이 원래 발 위치에 오도록
  var legW    = dw*0.12;
  var footR   = dw*0.11;
  for(var s=-1; s<=1; s+=2){
    var hipX=s*hipHalf, hipY=hemY - dh*0.015;
    var kneeX, kneeY, footX, footY, toeDir;
    if(jump){
      // 점프: 무릎 접어 다리 들기
      var up = Math.max(0, Math.min(1, -G.vy/(jumpV()) )); // 상승중이면 더 접기
      kneeX = hipX + s*legLen*0.6; kneeY = hemY + legLen*(0.30-0.10*up);
      footX = hipX + s*legLen*0.25; footY = hemY + legLen*(0.55-0.25*up);
      toeDir = s*0.3;
    } else {
      // 달리기: 앞뒤로 번갈아 스윙 + 앞으로 나올 때 들어올림
      var phse = G.runPhase + (s>0?Math.PI:0);
      var sw   = Math.sin(phse);
      var lift = Math.max(0, Math.sin(phse))*legLen*0.55;
      footX = hipX + sw*legLen*0.85;
      footY = hemY + legLen - lift;
      kneeX = hipX + sw*legLen*0.45;
      kneeY = hemY + legLen*0.5 - lift*0.45;
      toeDir = sw*0.5;
    }
    // 다리(둥근 관절선)
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.strokeStyle='#ef8a3a'; ctx.lineWidth=legW;      // 주황(코스튬 연결)
    ctx.beginPath(); ctx.moveTo(hipX,hipY); ctx.lineTo(kneeX,kneeY); ctx.lineTo(footX,footY); ctx.stroke();
    // 흰 발목 밴드(코스튬 줄무늬 느낌)
    ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=legW*0.55;
    ctx.beginPath(); ctx.moveTo(kneeX+(footX-kneeX)*0.55, kneeY+(footY-kneeY)*0.55); ctx.lineTo(footX,footY); ctx.stroke();
    // 신발
    ctx.save(); ctx.translate(footX,footY); ctx.rotate(toeDir);
    ctx.fillStyle='#4a2f16';
    ctx.beginPath(); ctx.ellipse(footR*0.35, 0, footR, footR*0.62, 0,0,6.28); ctx.fill();
    ctx.fillStyle='#fff'; // 신발 밑창
    ctx.beginPath(); ctx.ellipse(footR*0.35, footR*0.4, footR, footR*0.24, 0,0,6.28); ctx.fill();
    ctx.restore();
  }
}
function drawPlayer(){
  var ph=playerH(), pw=ph;
  var x=G.px, y=G.py;
  // 달리기 상하 바운스(발 구를 때 살짝 통통)
  var bounce = G.grounded ? Math.max(0,Math.sin(G.runPhase))* -ph*0.04 : 0;
  // 그림자
  ctx.fillStyle='rgba(0,0,0,.18)';
  var sg=(groundY()-(y+ph))/(H*0.30);
  ctx.beginPath(); ctx.ellipse(x+pw/2, groundY()+H*0.005, pw*0.34*(1-sg*0.4), H*0.018*(1-sg*0.3),0,0,6.28); ctx.fill();
  // 먼지 (달릴 때)
  if(G.grounded){
    ctx.fillStyle='rgba(255,255,255,.7)';
    for(var d=0;d<3;d++){ var dx=x-(G.t*300+d*40)%60; ctx.beginPath(); ctx.arc(dx, groundY()-H*0.005, (3-d)*2+2,0,6.28); ctx.fill(); }
  }
  var dw=pw, dh=pw;
  if(heroReady){ var ar=heroImg.width/heroImg.height; dw=pw; dh=pw/ar; if(dh>ph){ dh=ph; dw=ph*ar; } }
  ctx.save(); ctx.translate(x+pw/2, y+ph/2 + bounce); ctx.rotate(G.tilt);
  var hemY = dh/2 - dh*FOOT_FRAC;      // 잘린 몸통 밑단
  drawLegs(dw, dh, hemY);              // 다리(스프라이트 뒤)
  if(heroReady){
    var srcH = heroImg.height*(1-FOOT_FRAC);
    ctx.drawImage(heroImg, 0,0, heroImg.width, srcH, -dw/2, -dh/2, dw, dh*(1-FOOT_FRAC));
  } else {
    ctx.fillStyle='#ff9a1f'; roundRect(-pw*0.3,-ph*0.4,pw*0.6,ph*0.7,pw*0.2); ctx.fill();
  }
  ctx.restore();
}

function drawSparks(){
  for(var i=0;i<G.sparks.length;i++){
    var s=G.sparks[i]; ctx.globalAlpha=Math.max(0,s.life);
    ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  // 상단 문제 배너
  var by=H*0.05, bw=Math.min(W*0.9,560), bx=(W-bw)/2, bh=Math.min(H*0.14,96);
  ctx.save();
  roundRect(bx,by,bw,bh,bh*0.3); ctx.fillStyle='rgba(255,255,255,.92)'; ctx.fill();
  ctx.lineWidth=4; ctx.strokeStyle='#ff9a1f'; ctx.stroke();
  // 자음 큰 원
  var cxr=bx+bh*0.55, cyr=by+bh/2, cr=bh*0.36;
  ctx.fillStyle='#ff9a1f'; ctx.beginPath(); ctx.arc(cxr,cyr,cr,0,6.28); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='900 '+(cr*1.4)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(G.target, cxr, cyr+cr*0.05);
  // 안내 문구
  ctx.fillStyle='#2c4b6e'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font='900 '+Math.min(bh*0.28,26)+'px sans-serif';
  ctx.fillText('「'+G.target+'」로 시작하면 점프!', bx+bh*1.05, by+bh*0.36);
  ctx.font='800 '+Math.min(bh*0.2,17)+'px sans-serif'; ctx.fillStyle='#6b7f95';
  ctx.fillText('아니면 그냥 지나가요', bx+bh*1.05, by+bh*0.68);
  ctx.restore();

  // 좌상단 점수 / 진행
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.font='900 '+Math.min(H*0.03,22)+'px sans-serif';
  chip(12, 12, '⭐ '+G.score, '#2c4b6e');
  chip(12, 12+Math.min(H*0.05,38), '📘 '+G.qNum+' / 100', '#e5661b');
}
function chip(x,y,txt,col){
  ctx.font='900 '+Math.min(H*0.028,20)+'px sans-serif';
  var w=ctx.measureText(txt).width+24, h=Math.min(H*0.042,32);
  roundRect(x,y,w,h,h*0.4); ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
  ctx.fillStyle=col; ctx.textBaseline='middle'; ctx.fillText(txt, x+12, y+h/2+1); ctx.textBaseline='top';
}

function drawFlash(){
  if(G.flashT>0){
    var a=Math.min(1,G.flashT*2), sc=1+ (1-Math.min(1,G.flashT))*0.5;
    ctx.save(); ctx.globalAlpha=a*0.9; ctx.translate(W/2,H*0.42); ctx.scale(sc,sc);
    ctx.font='900 '+Math.min(H*0.3,220)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=10; ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.strokeText(G.target,0,0);
    ctx.fillStyle='rgba(255,154,31,.9)'; ctx.fillText(G.target,0,0);
    ctx.restore();
  }
}
function drawPraise(){
  if(G.praiseT>0 && G.praise){
    var a=Math.min(1,G.praiseT*1.3), pop=1+Math.sin((1.8-G.praiseT)*8)*0.04;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(W/2,H*0.30); ctx.scale(pop,pop);
    ctx.font='900 '+Math.min(H*0.075,52)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=8; ctx.strokeStyle='#fff'; ctx.strokeText(G.praise,0,0);
    var grd=ctx.createLinearGradient(0,-30,0,30); grd.addColorStop(0,'#ff5da2'); grd.addColorStop(1,'#ff9a1f');
    ctx.fillStyle=grd; ctx.fillText(G.praise,0,0);
    ctx.restore();
  }
}

function render(){
  ctx.save();
  if(G.shake>0){ ctx.translate((Math.random()-0.5)*10*G.shake,(Math.random()-0.5)*10*G.shake); }
  drawBg();
  // 새는 뒤→앞
  for(var i=0;i<G.birds.length;i++) drawBird(G.birds[i]);
  drawPlayer();
  drawSparks();
  drawFlash();
  drawHUD();
  drawPraise();
  ctx.restore();
}

/* ---------- 루프 ---------- */
var last=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!last) last=ts;
  var dt=Math.min(0.05,(ts-last)/1000); last=ts;
  if(G.running && !G.over){ update(dt); }
  if(G.running || G.over){ render(); }
}
requestAnimationFrame(loop);

/* ---------- 화면 전환 ---------- */
function show(id){
  ['menu','records','done'].forEach(function(s){
    document.getElementById(s).classList.toggle('on', s===id);
  });
}
function startGame(){
  newGame();
  G.running=true; G.startMs=Date.now();
  document.body.classList.add('playing');
  show(null);
  if(ac()&&AC.state==='suspended')AC.resume();
  Music.start();
}
function toMenu(){
  document.body.classList.remove('playing');
  Music.stop();
  G.running=false; G.over=false;
  var b=bestScore();
  var bl=document.getElementById('bestLine');
  if(b>0){ bl.style.display=''; bl.innerHTML='🏆 최고 기록: <b>'+b+'점</b>'; } else bl.style.display='none';
  show('menu');
}

/* ---------- 기록 화면 ---------- */
function recTable(recs, highlightScore){
  if(!recs.length) return '<div class="empty">아직 기록이 없어요.<br>100문제를 완주하면 여기에 남아요!</div>';
  var h='<table><tr><th>#</th><th>날짜</th><th>점수</th><th>틀림</th><th>시간</th></tr>';
  recs.forEach(function(r,i){
    var best = (i===0);
    var hl = (highlightScore!=null && r.score===highlightScore);
    h+='<tr class="'+(best?'best':'')+'">'
      +'<td>'+(best?'👑':(i+1))+'</td><td>'+r.date+'</td><td>'+r.score+'점</td>'
      +'<td>'+(r.wrong||0)+'</td><td>'+fmtSec(r.sec)+'</td></tr>';
  });
  return h+'</table>';
}
function fmtSec(s){ s=s||0; var m=(s/60)|0, ss=s%60; return m+'분 '+String(ss).padStart(2,'0')+'초'; }
function showRecords(){
  document.getElementById('recPanel').innerHTML = recTable(loadRecs(), null);
  show('records');
}
function showDone(rec, all){
  document.body.classList.remove('playing');
  document.getElementById('doneScore').textContent = rec.score+'점';
  var isBest = all.length && all[0].score===rec.score;
  document.getElementById('doneMsg').innerHTML =
    (isBest?'🥇 <b>새 최고 기록!</b> ':'') + '틀린 문제 '+rec.wrong+'개 · '+fmtSec(rec.sec)+' 만에 완주!<br>정윤우 최고! 정말 똑똑해! ❤️';
  document.getElementById('donePanel').innerHTML = recTable(all, rec.score);
  // 완주 후에도 캔버스에 폭죽
  G.over=true; G.running=false;
  for(var k=0;k<6;k++){ setTimeout(function(){ addSparks(W*(0.2+Math.random()*0.6), H*(0.2+Math.random()*0.4), 'hsl('+((Math.random()*360)|0)+',90%,60%)'); }, k*250); }
  show('done');
}

/* ---------- 버튼 ---------- */
document.getElementById('startBtn').onclick = startGame;
document.getElementById('againBtn').onclick = startGame;
document.getElementById('recBtn').onclick = showRecords;
document.getElementById('recBackBtn').onclick = toMenu;
document.getElementById('doneMenuBtn').onclick = toMenu;
document.getElementById('sndBtn').onclick = function(){
  muted=!muted; this.textContent = muted?'🔇':'🔊'; Music.setMuted(muted);
};

/* 데모 모드(?demo=run|jump): 개발 확인용 자동 시작/포즈 고정 */
var DEMO = (location.search.match(/demo=(\w+)/)||[])[1];
if(DEMO){ setTimeout(startGame, 60); }
var _loop=loop;
loop=function(ts){ // 데모 포즈 오버라이드를 위해 래핑
  if(DEMO==='jump' && G.running && !G.over){ G.grounded=false; G.py=groundY()-playerH()-H*0.22; G.vy=0; }
  _loop(ts);
};

/* 초기 최고기록 표시 */
(function(){ var b=bestScore(); if(b>0){ var bl=document.getElementById('bestLine'); bl.style.display=''; bl.innerHTML='🏆 최고 기록: <b>'+b+'점</b>'; } })();

/* =========================================================================
   자가 테스트: ?test=1 → 초성 검증 + 자동플레이 시뮬레이션(로직만)
   ========================================================================= */
if(location.search.indexOf('test')>=0){
  var log=[], fail=0;
  function assert(c,m){ if(!c){fail++;} log.push((c?'✅':'❌')+' '+m); }
  // 1) 단어 은행 초성 일치 검증
  TARGETS.forEach(function(t){
    WORDS[t].forEach(function(w){
      assert(choseongOf(w)===t, t+' 은행: "'+w+'" 초성='+choseongOf(w));
    });
  });
  // 2) 자동플레이 시뮬레이션: 정답이면 점프해서 먹는 완벽 플레이어
  newGame();
  var simDt=1/60, guard=0, ate=0;
  while(G.qNum<100 && guard<200000){
    guard++;
    // 스폰 강제 흐름
    update(simDt);
    // 완벽 플레이어: 화면상 target 초성 단어가 플레이어 근처에 오면 정답처리(직접 호출)
    for(var bi=G.birds.length-1;bi>=0;bi--){
      var b=G.birds[bi];
      if(b.eaten) continue;
      if(Math.abs(b.x - W*0.22) < W*0.05){
        if(choseongOf(b.word)===G.target){ onCorrect(b); ate++; }
        // 오답은 안 먹음(점프 안 함) → 그냥 통과
      }
    }
  }
  assert(G.qNum>=100, '100문제 완주 도달 (qNum='+G.qNum+', 정답먹음='+ate+', guard='+guard+')');
  assert(loadRecs().length>0, '완주 기록 저장됨 ('+loadRecs().length+'건)');
  // 결과 출력
  var pre=document.createElement('pre');
  pre.style.cssText='position:fixed;inset:0;z-index:99;background:#0d1420;color:#0f0;font:12px monospace;padding:16px;overflow:auto;white-space:pre-wrap;';
  pre.textContent = (fail===0?'🎉 ALL PASS ':'⚠️ '+fail+' FAIL ')+'('+log.length+' checks)\n\n'+log.join('\n');
  document.body.appendChild(pre);
  console.log('TEST', fail===0?'PASS':'FAIL', fail);
}
})();
</script>
