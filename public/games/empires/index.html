<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>MENEW EMPIRES · 세계 역사 시뮬레이션</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1420;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Hiragino Sans', sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none; }
  canvas { display: block; }
  button { font-family: inherit; }
  #game { position: fixed; inset: 0; z-index: 1; touch-action: none; cursor: grab; }
  #game.grabbing { cursor: grabbing; }

  /* ===== 상단 HUD ===== */
  #topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 6; display: none;
    align-items: center; gap: 6px; padding: 6px 8px; flex-wrap: wrap;
    background: linear-gradient(180deg, rgba(6,10,18,.92), rgba(6,10,18,.75));
    border-bottom: 1px solid rgba(255,255,255,.12); }
  body.playing #topbar { display: flex; }
  .tchip { color: #fff; font-weight: 800; font-size: 13px; background: rgba(255,255,255,.08);
    padding: 4px 10px; border-radius: 14px; white-space: nowrap; }
  .tchip small { opacity: .65; font-weight: 700; }
  #tcNation { border: 1px solid rgba(255,255,255,.25); }
  #tcNation i { display: inline-block; width: 11px; height: 11px; border-radius: 3px;
    margin-right: 6px; vertical-align: -1px; }
  #endTurn { margin-left: auto; padding: 8px 22px; font-size: 15px; font-weight: 900; cursor: pointer;
    color: #fff; background: #c92a4e; border: 2px solid #6d1128; border-bottom-width: 4px;
    border-radius: 8px; }
  #endTurn:hover { background: #e03a60; }
  #endTurn:disabled { opacity: .5; cursor: wait; }
  .tbtn2 { padding: 7px 12px; font-size: 13px; font-weight: 800; cursor: pointer; color: #fff;
    background: #35507a; border: 2px solid #1c2d4a; border-bottom-width: 3px; border-radius: 8px; }
  .tbtn2:hover { background: #41639a; }

  /* ===== 프로빈스 패널 ===== */
  #ppanel { position: fixed; left: 10px; bottom: 10px; z-index: 7; width: min(92vw, 330px);
    background: rgba(8,14,26,.94); border: 1px solid rgba(255,255,255,.2); border-radius: 12px;
    padding: 12px 14px; color: #e8eef5; font-size: 13px; display: none; }
  #ppanel h3 { font-size: 15px; color: #ffe28a; margin-bottom: 2px; padding-right: 20px; }
  #ppanel .owner { font-size: 12px; color: #9fc2e8; margin-bottom: 8px; }
  #ppanel .owner i { display: inline-block; width: 10px; height: 10px; border-radius: 3px;
    margin-right: 5px; vertical-align: -1px; }
  .prow { display: flex; align-items: center; justify-content: space-between; gap: 6px;
    padding: 3px 0; border-top: 1px solid rgba(255,255,255,.07); }
  .prow b { color: #fff; }
  .prow .lvlbtn { padding: 2px 9px; font-size: 12px; font-weight: 800; cursor: pointer; color: #062;
    background: #8be28a; border: 1px solid #2c7a2c; border-radius: 6px; white-space: nowrap; }
  .prow .lvlbtn:disabled { opacity: .4; cursor: default; }
  #pactions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  #pactions button { flex: 1; padding: 8px 6px; font-size: 13px; font-weight: 800; cursor: pointer;
    border-radius: 8px; color: #fff; border: 2px solid rgba(0,0,0,.4); border-bottom-width: 4px; }
  #recruitBtn { background: #3c7a46; }
  #recruitBtn:disabled { opacity: .45; }
  #pclose { position: absolute; right: 8px; top: 6px; background: none; border: none; color: #aab;
    font-size: 17px; cursor: pointer; }
  #phint { margin-top: 8px; font-size: 11.5px; color: #8fa3b8; line-height: 1.5; }
  .brk { font-size: 10.5px; color: #7f95ab; padding: 0 0 3px 16px; line-height: 1.45;
    border-top: none !important; }
  .prow input[type=range] { flex: 1; min-width: 70px; accent-color: #ffe28a; height: 20px; }
  .prow .pw { color: #ffb0b0; } .prow .pw2 { color: #9fd8ff; }

  /* 상단바 내역 팝업 */
  .tchip.click { cursor: pointer; border: 1px solid rgba(255,255,255,.18); }
  .tchip.click:hover { background: rgba(255,255,255,.18); }
  #infoPop { position: fixed; z-index: 9; display: none; min-width: 230px; max-width: 320px;
    background: rgba(8,14,26,.97); border: 1px solid rgba(255,255,255,.25); border-radius: 10px;
    padding: 10px 14px; color: #dfe9f3; font-size: 12.5px; line-height: 1.7; }
  #infoPop b { color: #ffe28a; }
  #infoPop .plus { color: #8be28a; } #infoPop .minus { color: #ff9a9a; }
  #infoPop .nt { font-size: 11px; color: #8fa3b8; margin-top: 4px; }

  /* 세계 패널 (순위+연대기) */
  #world { position: fixed; left: 10px; top: 52px; bottom: 10px; z-index: 8; width: min(94vw, 380px);
    background: rgba(8,14,26,.96); border: 1px solid rgba(255,255,255,.2); border-radius: 12px;
    padding: 12px; color: #e8eef5; display: none; flex-direction: column; }
  #wlist { overflow-y: auto; flex: 1; font-size: 12.5px; }
  #wlist .wt { display: block; color: #ffe28a; font-size: 14px; margin: 8px 0 5px; }
  #wlist table.rk { border-collapse: collapse; width: 100%; }
  #wlist .rk th { color: #8fa3b8; font-size: 10.5px; text-align: left; padding: 2px 6px 4px 2px; }
  #wlist .rk td { padding: 3px 6px 3px 2px; border-top: 1px solid rgba(255,255,255,.08); white-space: nowrap; }
  #wlist .rk tr.me td { color: #ffe28a; font-weight: 800; }
  #wlist .cc { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
  #wlist .chr div { padding: 3px 0; border-top: 1px solid rgba(255,255,255,.07); line-height: 1.5; }
  #wlist .chr small { color: #7f95ab; margin-right: 6px; }
  #wclose { position: absolute; right: 10px; top: 8px; background: none; border: none;
    color: #aab; font-size: 18px; cursor: pointer; }

  /* 자동저장 표시 */
  #saveInd { position: fixed; left: 10px; bottom: 10px; z-index: 6; font-size: 15px;
    color: #9fd8ff; background: rgba(0,0,0,.5); padding: 4px 10px; border-radius: 14px;
    opacity: 0; transition: opacity .4s; pointer-events: none; }
  #saveInd.show { opacity: 1; }

  /* 전투 리포트 */
  #brep { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 8;
    display: none; min-width: 300px; max-width: min(94vw, 460px);
    background: rgba(10,12,26,.96); border: 1px solid rgba(255,170,80,.5); border-radius: 12px;
    padding: 11px 16px; color: #e8eef5; font-size: 12.5px; line-height: 1.75; cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,.5); }
  #brep b.t { color: #ffc46b; font-size: 14px; }
  #brep .w { color: #8be28a; } #brep .l { color: #ff8a8a; }
  #brep .abs { color: #9fd8ff; }
  #brep .nt { font-size: 11px; color: #8fa3b8; }

  /* ===== 외교 패널 ===== */
  #diplo { position: fixed; right: 10px; top: 52px; bottom: 10px; z-index: 8; width: min(94vw, 360px);
    background: rgba(8,14,26,.96); border: 1px solid rgba(255,255,255,.2); border-radius: 12px;
    padding: 12px; color: #e8eef5; display: none; flex-direction: column; }
  #diplo h3 { color: #ffe28a; font-size: 16px; margin-bottom: 8px; }
  #dlist { overflow-y: auto; flex: 1; }
  .drow { display: flex; align-items: center; gap: 8px; padding: 7px 4px;
    border-top: 1px solid rgba(255,255,255,.08); font-size: 12.5px; }
  .drow i.cc { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .drow .dn { flex: 1; min-width: 0; }
  .drow .dn b { display: block; color: #fff; font-size: 13px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .drow .dn small { color: #92a7bd; }
  .drow .war { color: #ff7a7a; font-weight: 800; }
  .drow button { padding: 4px 9px; font-size: 11.5px; font-weight: 800; cursor: pointer;
    border-radius: 6px; border: 1px solid rgba(0,0,0,.5); color: #fff; }
  .drow .warBtn { background: #a33; }
  .drow .peaceBtn { background: #3a7; }
  #dclose { position: absolute; right: 10px; top: 8px; background: none; border: none;
    color: #aab; font-size: 18px; cursor: pointer; }

  /* ===== 알림 로그 ===== */
  #log { position: fixed; right: 10px; top: 52px; z-index: 5; display: flex; flex-direction: column;
    gap: 6px; pointer-events: none; max-width: min(80vw, 330px); }
  .toast { background: rgba(10,16,30,.88); border-left: 4px solid #ffe28a; color: #eef;
    font-size: 12.5px; padding: 8px 12px; border-radius: 8px; opacity: 1;
    transition: opacity .6s; line-height: 1.45; }
  .toast.war { border-left-color: #ff6a6a; }
  .toast.good { border-left-color: #7ed36f; }

  /* ===== 툴팁 ===== */
  #tip { position: fixed; z-index: 9; pointer-events: none; display: none;
    background: rgba(8,12,24,.92); color: #fff; font-size: 12px; padding: 6px 10px;
    border-radius: 7px; border: 1px solid rgba(255,255,255,.18); line-height: 1.5; }

  /* ===== 메뉴 공통 ===== */
  .screen { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 15px;
    background: rgba(6, 10, 22, .58); backdrop-filter: blur(3px); }
  .screen h1 { color: #fff; font-size: 46px; letter-spacing: 4px; font-weight: 900; text-align: center;
    text-shadow: 3px 3px 0 #14406b, 6px 6px 0 rgba(0,0,0,.5); }
  .screen h1 span { display: block; font-size: 13px; letter-spacing: 7px; color: #ffe28a;
    transform: rotate(-2deg); margin-top: 8px; text-shadow: 1px 1px 0 rgba(0,0,0,.6); }
  .screen h2 { color: #ffe28a; font-size: 23px; letter-spacing: 2px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.6); }
  .bigbtn { padding: 13px 34px; font-size: 17px; font-weight: bold; cursor: pointer;
    color: #fff; background: #1f6f54; border: 2px solid #0c3a2a; border-bottom-width: 5px;
    border-radius: 6px; }
  .bigbtn:hover { background: #2a8a68; }
  .graybtn { padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer;
    color: #fff; background: #35507a; border: 2px solid #1c2d4a; border-bottom-width: 4px;
    border-radius: 6px; }
  .graybtn:hover { background: #41639a; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  #nick { padding: 11px 16px; font-size: 16px; border-radius: 6px; border: 2px solid #444;
    background: rgba(0,0,0,.55); color: #fff; text-align: center; width: 230px; outline: none; }
  #nick:focus { border-color: #ffe28a; }
  .help { color: #e8e8e8; font-size: 13px; line-height: 1.9; background: rgba(0,0,0,.45);
    padding: 11px 22px; border-radius: 8px; max-width: 90vw; text-align: center; }
  .help b { color: #ffe28a; }
  .credit { color: #cfd6dd; font-size: 12px; background: rgba(0,0,0,.4);
    padding: 6px 14px; border-radius: 20px; }
  .credit a { color: #ffe28a; text-decoration: none; }
  .panel { background: rgba(0,0,0,.62); border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px; padding: 16px 22px; max-width: 90vw; max-height: 56vh; overflow: auto; }
  .panel table { border-collapse: collapse; color: #eee; font-size: 14px; }
  .panel th { color: #ffe28a; text-align: left; padding: 4px 12px 8px 4px; font-size: 12px; }
  .panel td { padding: 4px 12px 4px 4px; border-top: 1px solid rgba(255,255,255,.12); }
  .note { color: #9aa; font-size: 12px; }
  #loadmsg { color: #cfe3ff; font-size: 14px; letter-spacing: 1px; }

  /* ===== 국가 선택 ===== */
  #pick { position: fixed; inset: 0; z-index: 9; display: none; pointer-events: none; }
  #pickTop { position: absolute; top: 0; left: 0; right: 0; padding: 10px; text-align: center;
    background: linear-gradient(180deg, rgba(6,10,18,.9), transparent); color: #ffe28a;
    font-size: 16px; font-weight: 900; text-shadow: 1px 1px 0 #000; }
  #pickCard { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
    pointer-events: auto; background: rgba(8,14,26,.95); border: 1px solid rgba(255,255,255,.25);
    border-radius: 12px; padding: 12px 18px; color: #e8eef5; font-size: 13px; text-align: center;
    display: none; min-width: 270px; }
  #pickCard b { color: #ffe28a; font-size: 17px; }
  #pickCard .st { margin: 6px 0 10px; line-height: 1.6; }
  #pickBack { position: absolute; left: 12px; top: 10px; pointer-events: auto; }

  /* ===== 결과 ===== */
  #resStats { color: #fff; font-size: 16px; font-weight: 800; text-align: center; line-height: 1.9;
    background: rgba(0,0,0,.5); padding: 12px 28px; border-radius: 12px; }
  #resStats .big { font-size: 28px; color: #ffe28a; }

  #err { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 99;
    color: #fff; background: #b32; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  @media (max-width: 560px) {
    .screen h1 { font-size: 32px; }
    .tchip { font-size: 11px; padding: 3px 7px; }
    #endTurn { padding: 7px 14px; font-size: 13px; }
    #log { top: 84px; }
    #diplo { top: 84px; }
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- 상단 HUD -->
  <div id="topbar">
    <span class="tchip" id="tcNation"><i></i></span>
    <span class="tchip" id="tcGold"></span>
    <span class="tchip" id="tcFood"></span>
    <span class="tchip" id="tcPop"></span>
    <span class="tchip" id="tcArmy"></span>
    <span class="tchip" id="tcTech"></span>
    <span class="tchip" id="tcDate"></span>
    <button class="tbtn2" id="diploBtn"></button>
    <button class="tbtn2" id="worldBtn"></button>
    <button class="tbtn2" id="idleBtn">🎯</button>
    <button class="tbtn2" id="muteBtn">🔊</button>
    <button class="tbtn2" id="exitBtn">≡</button>
    <button id="endTurn"></button>
  </div>

  <!-- 프로빈스 패널 -->
  <div id="ppanel">
    <button id="pclose">✕</button>
    <h3 id="pname"></h3>
    <div class="owner" id="powner"></div>
    <div id="prows"></div>
    <div id="pactions"></div>
    <div id="phint"></div>
  </div>

  <!-- 외교 패널 -->
  <div id="diplo">
    <button id="dclose">✕</button>
    <h3 id="dtitle"></h3>
    <div id="dlist"></div>
  </div>

  <!-- 세계 패널 -->
  <div id="world">
    <button id="wclose">✕</button>
    <h3 id="wtitle" style="color:#ffe28a;font-size:16px;margin-bottom:6px"></h3>
    <div id="wlist"></div>
  </div>

  <div id="log"></div>
  <div id="tip"></div>
  <div id="infoPop"></div>
  <div id="brep"></div>
  <div id="saveInd">💾</div>

  <!-- 메인 메뉴 -->
  <div class="screen" id="menu" style="display:flex">
    <h1>🌍 MENEW EMPIRES<span id="subT"></span></h1>
    <div id="loadmsg"></div>
    <input id="nick" maxlength="12">
    <div class="btnrow">
      <button class="bigbtn" id="startBtn"></button>
      <button class="bigbtn" id="contBtn" style="display:none"></button>
    </div>
    <div class="btnrow">
      <button class="graybtn" id="recBtn"></button>
      <button class="graybtn" id="exportBtn"></button>
      <button class="graybtn" id="importBtn"></button>
    </div>
    <div class="help" id="helpBox"></div>
    <div class="credit" id="credit"></div>
  </div>

  <!-- 국가 선택 -->
  <div id="pick">
    <div id="pickTop"></div>
    <button class="graybtn" id="pickBack"></button>
    <div id="pickCard">
      <b id="pcName"></b>
      <div class="st" id="pcStats"></div>
      <button class="bigbtn" id="pcGo"></button>
    </div>
  </div>

  <!-- 기록실 -->
  <div class="screen" id="records">
    <h2 id="recT"></h2>
    <div class="panel" id="recPanel"></div>
    <div class="note" id="recNote"></div>
    <button class="graybtn" id="recBackBtn"></button>
  </div>

  <!-- 결과 -->
  <div class="screen" id="results">
    <h2 id="resT"></h2>
    <div id="resStats"></div>
    <div class="panel" id="resPanel"></div>
    <div class="btnrow">
      <button class="bigbtn" id="retryBtn"></button>
      <button class="graybtn" id="menuBtn"></button>
    </div>
  </div>

  <div id="err"></div>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">

  <script src="d3-delaunay.min.js"></script>
  <script src="world.js"></script>
  <script src="cities.js"></script>
  <script src="empires.js"></script>
</body>
</html>
