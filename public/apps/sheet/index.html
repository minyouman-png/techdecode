<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MeNew Sheet</title>
<link rel="stylesheet" href="../vendor/xspreadsheet.css">
<link rel="stylesheet" href="../apps.css">
<style>
  #grid { position: fixed; top: var(--topbar-h); left: 0; right: 0; bottom: 0; }
  .x-spreadsheet { font-family: inherit; }
</style>
</head>
<body>
<header class="apptop">
  <a class="back" id="backLink" href="/tools/" title="MeNew Docs">←</a>
  <span class="brand">MeNew <em>Sheet</em></span>
  <span class="fname" id="fname"></span>
  <span class="spacer"></span>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.ods" hidden>
  <button class="btn" id="btnNew"></button>
  <button class="btn" id="btnOpen"></button>
  <button class="btn primary" id="btnSave"></button>
  <button class="btn" id="btnCsv">CSV</button>
</header>
<div id="grid"></div>
<div class="privnote" id="privnote"></div>
<script src="../vendor/xlsx.full.min.js"></script>
<script src="../vendor/xspreadsheet.js"></script>
<script src="sheet.js"></script>
<script data-goatcounter="https://minyouman.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
