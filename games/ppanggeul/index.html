<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>빵글이의 모험 · PPANGGEUL'S ADVENTURE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1420;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Hiragino Sans', sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none; }
  canvas { display: block; }
  button { font-family: inherit; }
  #game { position: fixed; inset: 0; z-index: 1; touch-action: none; }

  /* ===== HUD ===== */
  #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 5; display: none;
    align-items: center; gap: 8px; padding: 8px 12px; pointer-events: none;
    flex-wrap: wrap; }
  body.playing #hud { display: flex; }
  .chip { color: #fff; font-weight: 900; font-size: 15px; background: rgba(20,14,8,.55);
    padding: 5px 13px; border-radius: 16px; text-shadow: 1px 1px 0 rgba(0,0,0,.6);
    white-space: nowrap; border: 1px solid rgba(255,255,255,.18); }
  #hStage { color: #ffe28a; }
  #hTime.low { color: #ff8a8a; }
  #hudBtns { position: fixed; right: 10px; top: 8px; z-index: 6; display: none; gap: 8px; }
  body.playing #hudBtns { display: flex; }
  .iconbtn { width: 40px; height: 40px; border-radius: 12px; font-size: 18px; cursor: pointer;
    color: #fff; background: rgba(20,14,8,.55); border: 1px solid rgba(255,255,255,.25); }

  /* ===== 메뉴 공통 ===== */
  .screen { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 15px;
    background: rgba(16, 10, 26, .55); backdrop-filter: blur(3px); }
  .screen h1 { color: #fff; font-size: 54px; letter-spacing: 6px; font-weight: 900; text-align: center;
    text-shadow: 3px 3px 0 #3a4fb0, 6px 6px 0 rgba(0,0,0,.5); }
  .screen h1 span { display: block; font-size: 13px; letter-spacing: 10px; color: #ffe28a;
    transform: rotate(-2deg); margin-top: 8px; text-shadow: 1px 1px 0 rgba(0,0,0,.6); }
  .screen h2 { color: #ffe28a; font-size: 23px; letter-spacing: 2px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.6); }
  .bigbtn { padding: 13px 34px; font-size: 17px; font-weight: bold; cursor: pointer;
    color: #fff; background: #3a4fb0; border: 2px solid #1c2560; border-bottom-width: 5px;
    border-radius: 6px; }
  .bigbtn:hover { background: #4a60c8; }
  .graybtn { padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer;
    color: #fff; background: #4a5a7a; border: 2px solid #263349; border-bottom-width: 4px;
    border-radius: 6px; }
  .graybtn:hover { background: #5a6e96; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  #nick { padding: 11px 16px; font-size: 16px; border-radius: 6px; border: 2px solid #444;
    background: rgba(0,0,0,.55); color: #fff; text-align: center; width: 230px; outline: none; }
  #nick:focus { border-color: #ffe28a; }
  .help { color: #eee; font-size: 13px; line-height: 1.9; background: rgba(0,0,0,.45);
    padding: 11px 22px; border-radius: 8px; max-width: 90vw; text-align: center; }
  .help b { color: #ffe28a; }
  .credit { color: #cfd6dd; font-size: 12px; background: rgba(0,0,0,.4);
    padding: 6px 14px; border-radius: 20px; }
  .credit a { color: #ffe28a; text-decoration: none; }
  .panel { background: rgba(0,0,0,.62); border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px; padding: 16px 22px; max-width: 90vw; max-height: 54vh; overflow: auto; }
  .panel table { border-collapse: collapse; color: #eee; font-size: 14px; }
  .panel th { color: #ffe28a; text-align: left; padding: 4px 12px 8px 4px; font-size: 12px; }
  .panel td { padding: 4px 12px 4px 4px; border-top: 1px solid rgba(255,255,255,.12); }
  .note { color: #9aa; font-size: 12px; }
  #resStats { color: #fff; font-size: 17px; font-weight: 800; text-align: center; line-height: 1.9;
    background: rgba(0,0,0,.5); padding: 12px 28px; border-radius: 12px; }
  #resStats .big { font-size: 30px; color: #ffe28a; }
  #contInfo { color: #fff; background: rgba(0,0,0,.5); padding: 14px 30px; border-radius: 12px;
    text-align: center; min-width: 240px; }
  #contInfo .contDesc { font-size: 13px; color: #cfd6dd; margin-bottom: 10px; line-height: 1.5; }
  #contInfo .contRow { display: flex; justify-content: space-between; gap: 24px; font-weight: 800;
    font-size: 17px; padding: 3px 0; }
  #contInfo .contArrow { justify-content: center; color: #ff9a8a; font-size: 14px; }
  #contInfo .contHi { color: #ffe28a; font-size: 20px; }

  /* ===== 터치 컨트롤 ===== */
  #touch { display: none; }
  body.touch.playing #touch { display: block; }
  #touch .tbtn { position: fixed; z-index: 7; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.4); background: rgba(20,14,8,.4); color: #fff;
    font-weight: 900; display: flex; align-items: center; justify-content: center;
    touch-action: none; -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent; }
  #touch .tbtn.on { background: rgba(255,255,255,.35); }
  #tLeft  { left: 16px;  bottom: 24px; width: 72px; height: 72px; font-size: 28px; }
  #tRight { left: 104px; bottom: 24px; width: 72px; height: 72px; font-size: 28px; }
  #tJump  { right: 18px; bottom: 24px; width: 84px; height: 84px; font-size: 26px;
    background: rgba(80,160,80,.45); }
  #tRun   { right: 118px; bottom: 24px; width: 64px; height: 64px; font-size: 20px;
    background: rgba(200,120,60,.45); }

  #err { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 99;
    color: #fff; background: #b32; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  @media (max-width: 560px) {
    .screen h1 { font-size: 38px; }
    .chip { font-size: 12px; padding: 4px 9px; }
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <span class="chip" id="hStage"></span>
    <span class="chip" id="hScore"></span>
    <span class="chip" id="hCoin"></span>
    <span class="chip" id="hLife"></span>
    <span class="chip" id="hTime"></span>
  </div>
  <div id="hudBtns">
    <button class="iconbtn" id="muteBtn">🔊</button>
    <button class="iconbtn" id="pauseBtn">⏸</button>
  </div>

  <!-- 메인 메뉴 -->
  <div class="screen" id="menu" style="display:flex">
    <h1>🌙 빵글이의 모험<span id="subT"></span></h1>
    <input id="nick" maxlength="12">
    <div class="btnrow">
      <button class="bigbtn" id="startBtn"></button>
      <button class="bigbtn" id="contBtn" style="display:none"></button>
    </div>
    <div class="btnrow">
      <button class="graybtn" id="recBtn"></button>
      <button class="graybtn" id="exportBtn"></button>
      <button class="graybtn" id="importBtn"></button>
    </div>
    <div class="help" id="helpBox"></div>
    <div class="credit" id="credit"></div>
  </div>

  <!-- 일시정지 -->
  <div class="screen" id="pause">
    <h2 id="pauseT"></h2>
    <div class="btnrow">
      <button class="bigbtn" id="resumeBtn"></button>
      <button class="graybtn" id="quitBtn"></button>
    </div>
  </div>

  <!-- 기록실 -->
  <div class="screen" id="records">
    <h2 id="recT"></h2>
    <div class="panel" id="recPanel"></div>
    <div class="note" id="recNote"></div>
    <button class="graybtn" id="recBackBtn"></button>
  </div>

  <!-- 이어하기 (점수 50% 소모) -->
  <div class="screen" id="continue">
    <h2 id="contTitle"></h2>
    <div id="contInfo"></div>
    <div class="btnrow">
      <button class="bigbtn" id="doContBtn"></button>
      <button class="graybtn" id="giveupBtn"></button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="screen" id="results">
    <h2 id="resT"></h2>
    <div id="resStats"></div>
    <div class="panel" id="resPanel"></div>
    <div class="btnrow">
      <button class="bigbtn" id="retryBtn"></button>
      <button class="graybtn" id="menuBtn"></button>
    </div>
  </div>

  <!-- 터치 -->
  <div id="touch">
    <div class="tbtn" id="tLeft">◀</div>
    <div class="tbtn" id="tRight">▶</div>
    <div class="tbtn" id="tJump">⬆</div>
    <div class="tbtn" id="tRun">🏃</div>
  </div>

  <div id="err"></div>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">

  <script src="ppanggeul.js?v=1"></script>
</body>
</html>
