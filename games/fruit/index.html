<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>과일블럭게임 · Fruit Blocks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden;
    background: linear-gradient(160deg, #2a1a4a 0%, #1a2a5a 55%, #123a4a 100%);
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Hiragino Sans', sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none; }
  canvas { display: block; }
  button { font-family: inherit; }
  #game { position: fixed; inset: 0; z-index: 1; touch-action: none; }

  /* ===== HUD ===== */
  #hud { position: fixed; left: 50%; top: 0; transform: translateX(-50%); z-index: 5;
    width: min(96vw, 560px); padding: 8px 4px 0; display: none; gap: 6px;
    flex-direction: column; pointer-events: none; }
  body.playing #hud { display: flex; }
  #hudRow1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .chip { color: #fff; font-weight: 900; font-size: 15px; background: rgba(0,0,0,.42);
    padding: 5px 12px; border-radius: 18px; text-shadow: 1px 1px 0 rgba(0,0,0,.6);
    white-space: nowrap; }
  .chip small { font-weight: 700; opacity: .75; font-size: 11px; }
  #hudLevel { color: #ffe957; }
  #hudRank { font-size: 12px; color: #aef3b0; }
  #hudScore { font-size: 16px; }
  #hudMoves { font-size: 19px; color: #fff; background: rgba(201,42,78,.62); }
  #barWrap { height: 16px; background: rgba(0,0,0,.45); border-radius: 9px; overflow: hidden;
    border: 1px solid rgba(255,255,255,.25); position: relative; }
  #bar { height: 100%; width: 0%; border-radius: 8px;
    background: linear-gradient(90deg, #ffb547, #ffe957); transition: width .25s; }
  #barTxt { position: absolute; inset: 0; text-align: center; font-size: 11px; font-weight: 800;
    color: #fff; line-height: 15px; text-shadow: 1px 1px 0 rgba(0,0,0,.7); }
  #hudBtns { position: fixed; right: 10px; bottom: 10px; z-index: 6; display: none; gap: 8px; }
  body.playing #hudBtns { display: flex; }
  .iconbtn { width: 42px; height: 42px; border-radius: 12px; font-size: 19px; cursor: pointer;
    color: #fff; background: rgba(0,0,0,.45); border: 2px solid rgba(255,255,255,.3); }
  .iconbtn:hover { background: rgba(255,255,255,.2); }

  /* ===== 메뉴 공통 ===== */
  .screen { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: rgba(10, 8, 30, .55); backdrop-filter: blur(3px); }
  .screen h1 { color: #fff; font-size: 50px; letter-spacing: 3px; font-weight: 900; text-align: center;
    text-shadow: 3px 3px 0 #a02040, 6px 6px 0 rgba(0,0,0,.5); }
  .screen h1 span { display: block; font-size: 13px; letter-spacing: 8px; color: #ffe957;
    transform: rotate(-3deg); margin-top: 8px; text-shadow: 1px 1px 0 rgba(0,0,0,.6); }
  .screen h2 { color: #ffe957; font-size: 24px; letter-spacing: 2px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.6); }
  .bigbtn { padding: 13px 34px; font-size: 17px; font-weight: bold; cursor: pointer;
    color: #fff; background: #c92a4e; border: 2px solid #6d1128; border-bottom-width: 5px;
    border-radius: 6px; }
  .bigbtn:hover { background: #e03a60; }
  .graybtn { padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer;
    color: #fff; background: #35507a; border: 2px solid #1c2d4a; border-bottom-width: 4px;
    border-radius: 6px; }
  .graybtn:hover { background: #41639a; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  #nick { padding: 11px 16px; font-size: 16px; border-radius: 6px; border: 2px solid #444;
    background: rgba(0,0,0,.55); color: #fff; text-align: center; width: 230px; outline: none; }
  #nick:focus { border-color: #ffe957; }
  .help { color: #e8e8e8; font-size: 13.5px; line-height: 2; background: rgba(0,0,0,.45);
    padding: 11px 24px; border-radius: 8px; max-width: 88vw; text-align: center; }
  .help b { color: #ffe957; }
  .credit { color: #cfd6dd; font-size: 12px; background: rgba(0,0,0,.4);
    padding: 6px 14px; border-radius: 20px; }
  .credit a { color: #ffe957; text-decoration: none; }

  /* 기록실 / 결과 */
  .panel { background: rgba(0,0,0,.62); border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px; padding: 16px 22px; max-width: 88vw; max-height: 56vh; overflow: auto; }
  .panel table { border-collapse: collapse; color: #eee; font-size: 14px; }
  .panel th { color: #ffe957; text-align: left; padding: 4px 14px 8px 4px; font-size: 12px;
    letter-spacing: 1px; }
  .panel td { padding: 4px 14px 4px 4px; border-top: 1px solid rgba(255,255,255,.12); }
  .panel .me { color: #ffe957; font-weight: bold; }
  .note { color: #9aa; font-size: 12px; }
  #resStats { color: #fff; font-size: 17px; font-weight: 800; text-align: center; line-height: 1.9;
    background: rgba(0,0,0,.5); padding: 12px 28px; border-radius: 12px; }
  #resStats .rankName { color: #aef3b0; }
  #resStats .big { font-size: 30px; color: #ffe957; }

  #err { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 99;
    color: #fff; background: #b32; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  @media (max-width: 520px) {
    .screen h1 { font-size: 36px; }
    .chip { font-size: 13px; padding: 4px 9px; }
    #hudMoves { font-size: 16px; } #hudScore { font-size: 13px; }
    #hudRank { display: none; }
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hudRow1">
      <span class="chip" id="hudLevel"></span>
      <span class="chip" id="hudRank"></span>
      <span class="chip" id="hudMoves"></span>
      <span class="chip" id="hudScore"></span>
    </div>
    <div id="barWrap"><div id="bar"></div><div id="barTxt"></div></div>
  </div>
  <div id="hudBtns">
    <button class="iconbtn" id="muteBtn">🔊</button>
    <button class="iconbtn" id="pauseBtn">⏸</button>
  </div>

  <!-- 메인 메뉴 -->
  <div class="screen" id="menu" style="display:flex">
    <h1>🍎 FRUIT BLOCKS<span id="subT"></span></h1>
    <input id="nick" maxlength="12">
    <div class="btnrow">
      <button class="bigbtn" id="startBtn"></button>
      <button class="graybtn" id="recBtn"></button>
    </div>
    <div class="btnrow">
      <button class="graybtn" id="exportBtn"></button>
      <button class="graybtn" id="importBtn"></button>
    </div>
    <div class="help" id="helpBox"></div>
    <div class="credit" id="credit"></div>
  </div>

  <!-- 기록실 -->
  <div class="screen" id="records">
    <h2 id="recT"></h2>
    <div class="panel" id="recPanel"></div>
    <div class="note" id="recNote"></div>
    <button class="graybtn" id="recBackBtn"></button>
  </div>

  <!-- 일시정지 -->
  <div class="screen" id="pause">
    <h2 id="pauseT"></h2>
    <div class="btnrow">
      <button class="bigbtn" id="resumeBtn"></button>
      <button class="graybtn" id="quitBtn"></button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="screen" id="results">
    <h2 id="resT"></h2>
    <div id="resStats"></div>
    <div class="panel" id="resPanel"></div>
    <div class="btnrow">
      <button class="bigbtn" id="retryBtn"></button>
      <button class="graybtn" id="menuBtn"></button>
    </div>
  </div>

  <div id="err"></div>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">

  <script src="fruit.js"></script>
</body>
</html>
